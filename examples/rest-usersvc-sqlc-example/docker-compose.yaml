version: "3.7"

services:
  pg:
    image: bitnami/postgresql
    container_name: alya-rest-usersvc-sqlc-pg
    environment:
      POSTGRES_USER: alyatest
      POSTGRES_PASSWORD: alyatest
      POSTGRES_DB: alyatest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql

volumes:
  postgres_data:
